function renderSidebar(){
  var h='',lastCat='';
  saved.forEach(function(items,sid){
    var sec=SCHEMA.find(function(s){return s.id===sid});if(!sec)return;
    var io=openGroups[sid],ia=currentPage.indexOf(sid)===0;
    var cat=SECTION_CATS[sid]||sec.label;
    // Category header with divider
    if(cat!==lastCat){
      if(lastCat)h+='<div style="height:1px;background:var(--bd);margin:6px 0"></div>';
      h+='<div class="sb-cat">'+cat+'</div>';

    }

      } else {
        var ico='';
        if(sid==='connections'&&it.id==='discord')ico='<svg width="13" height="13" viewBox="0 0 18 18" fill="none" style="flex-shrink:0;margin-right:5px;margin-left:-2px"><path d="M15 4.2A14 14 0 0 0 11.8 3a8 8 0 0 0-.4.82 12.8 12.8 0 0 0-3.8 0A8 8 0 0 0 7.2 3 14 14 0 0 0 4 4.2C2.2 6.8 1.7 9.4 1.9 11.9a14.4 14.4 0 0 0 4.4 2.2c.36-.5.68-1 .95-1.55" fill="#5865F2"/></svg>';
        else if(sid==='connections'&&it.id==='telegram')ico='<svg width="13" height="13" viewBox="0 0 18 18" fill="none" style="flex-shrink:0;margin-right:5px;margin-left:-2px"><path d="M2 9l14-7-4 14-3.5-4.5L12 9l-4 2.5L2 9z" fill="#26A5E4"/></svg>';

      }

var DYNAMIC_PAGES={'product-products':1,'product-customers':1,'payment-transactions':1,'analytics-overview':1,'product-newproduct':1,'payouts-destinations':1};

function goPage(id){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on')});
  document.querySelectorAll('.ni,.ni-sub,.grp-hdr').forEach(function(n){n.classList.remove('on')});
  document.getElementById('ni-home').classList.remove('on');
  currentPage=id;
  if(id==='home'){document.getElementById('p-home').classList.add('on');document.getElementById('ni-home').classList.add('on');document.getElementById('page-title').textContent='Home';buildHome()}
  else if(id==='account'){buildAccountPage();document.getElementById('p-account').classList.add('on');document.getElementById('page-title').textContent='Account verification'}
  else{
    var pg=document.getElementById('p-'+id);
    if(!pg){pg=document.createElement('div');pg.className='page';pg.id='p-'+id;document.querySelector('.main').appendChild(pg)}
    pg.classList.add('on');
    if(!pg.dataset.built||DYNAMIC_PAGES[id]){buildPage(id,pg);pg.dataset.built='1'}

    document.getElementById('page-title').textContent=it?it.label:sec?sec.label:id
  }
  var sid=id.split('-')[0];if(sid!=='home'&&sid!=='account')openGroups[sid]=true;
  renderSidebar()
}

// ─── PAGE BUILDER ──────────────────────────────────────────────────────────
function buildPage(id,pg){
  if(id==='product-products') buildProductsList(pg);
  else if(id.indexOf('product-detail-')===0) buildProductDetail(pg,id.replace('product-detail-',''));
  else if(id.indexOf('customer-detail-')===0) buildCustomerDetail(pg,id.replace('customer-detail-',''));
  else if(id==='product-customers') buildCustomersList(pg);
  else if(id==='product-discounts') buildDiscountsPage(pg);
  else if(id==='product-newproduct') buildNewProductPage(pg);
  else if(id==='payment-transactions') buildTransactionsPage(pg);
  else if(id==='payment-payment-config') buildPaymentConfigPage(pg);
  else if(id==='payment-refunds') buildRefundsPage(pg);
  else if(id==='payouts-overview') buildPayoutsOverview(pg);
  else if(id==='payouts-destinations') buildPayoutsDestinations(pg);
  else if(id==='payouts-history') buildPayoutsHistory(pg);
  else if(id==='analytics-overview') buildAnalyticsPage(pg);
  else if(id==='connections-discord') buildDiscordPage(pg);
  else if(id==='connections-telegram') buildTelegramPage(pg);
  else if(id==='notifications-channels') buildNotificationsPage(pg);
  else if(id==='config-settings') buildSettingsPage(pg);
  else if(id==='config-team') buildTeamPage(pg);
